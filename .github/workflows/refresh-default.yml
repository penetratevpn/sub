on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

permissions:
  contents: write

concurrency:
  group: refresh-default
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      PYTHONUNBUFFERED: '1'
      SUBS_SECRET: ${{ secrets.VPN_SUBS }}
      HWID_SECRET: ${{ secrets.VPN_HWID }}
      XRAY_VERSION: '1.8.24'
      THREADS: '24'
      TIMEOUT: '8'
      REMARK_FORMAT: '{flag} {country}{index_suffix}'
      REMARK_LANGUAGE: 'en'
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Install Xray
        run: |
          curl -fsSL -o xray.zip https://github.com/XTLS/Xray-core/releases/download/v${XRAY_VERSION}/Xray-linux-64.zip
          python - <<'PY'
          import zipfile
          with zipfile.ZipFile('xray.zip') as zf:
              zf.extractall('xray-bin')
          PY
          chmod +x xray-bin/xray
          ./xray-bin/xray version

      - name: Validate required secrets
        run: |
          test -n "$SUBS_SECRET" || { echo 'VPN_SUBS secret is missing'; exit 1; }

      - name: Prepare private subscriptions file
        run: |
          umask 077
          printf '%s\n' "$SUBS_SECRET" > subs.private.txt

      - name: Refresh default file
        run: |
          if [ -n "$HWID_SECRET" ]; then
            python update_default.py \
              --default default \
              --subs subs.private.txt \
              --hwid "$HWID_SECRET" \
              --xray ./xray-bin/xray \
              --download-geoip \
              --threads "$THREADS" \
              --timeout "$TIMEOUT" \
              --remark-format "$REMARK_FORMAT" \
              --remark-language "$REMARK_LANGUAGE"
          else
            python update_default.py \
              --default default \
              --subs subs.private.txt \
              --xray ./xray-bin/xray \
              --download-geoip \
              --threads "$THREADS" \
              --timeout "$TIMEOUT" \
              --remark-format "$REMARK_FORMAT" \
              --remark-language "$REMARK_LANGUAGE"
          fi

      - name: Replace Chrome fingerprints with Firefox
        run: |
          python - <<'PY'
          import re
          from urllib.parse import urlparse, parse_qs, urlencode, urlunparse
          
          def replace_fingerprint(line):
              """Replace chrome fingerprint with firefox in VLESS URLs"""
              # Only process VLESS URLs
              if not line.startswith('vless://'):
                  return line
              
              try:
                  # Parse the URL
                  parts = urlparse(line.strip())
                  
                  # If no query parameters, add fp=firefox
                  if not parts.query:
                      return line.rstrip() + '?fp=firefox\n'
                  
                  # Parse query parameters
                  params = parse_qs(parts.query, keep_blank_values=True)
                  
                  # Remove any existing fp parameter
                  params.pop('fp', None)
                  
                  # Add fp=firefox
                  params['fp'] = ['firefox']
                  
                  # Rebuild query string
                  new_query = urlencode(params, doseq=True)
                  
                  # Rebuild the URL
                  new_parts = list(parts)
                  new_parts[4] = new_query  # Index 4 is query string
                  
                  # Return with newline
                  return urlunparse(new_parts) + '\n'
                  
              except Exception as e:
                  print(f"Warning: Could not parse line: {line[:100]}... Error: {e}")
                  return line
          
          # Read the file
          try:
              with open('default', 'r') as f:
                  lines = f.readlines()
          except FileNotFoundError:
              print("default file not found, skipping fingerprint replacement")
              exit(0)
          
          if not lines:
              print("default file is empty, skipping fingerprint replacement")
              exit(0)
          
          # Process each line
          processed_lines = [replace_fingerprint(line) for line in lines]
          
          # Count changes
          original_content = ''.join(lines)
          new_content = ''.join(processed_lines)
          
          if original_content != new_content:
              # Write back
              with open('default', 'w') as f:
                  f.writelines(processed_lines)
              
              # Count how many lines were modified
              modified = sum(1 for i, line in enumerate(lines) if line != processed_lines[i])
              print(f"✅ Replaced Chrome fingerprints with Firefox in {modified} VLESS URLs")
          else:
              print("ℹ️ No changes needed - all VLESS URLs already have Firefox fingerprints")
          
          PY

      - name: Commit updated default
        run: |
          if git diff --quiet -- default; then
            echo 'No changes to commit'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add default
          git commit -m 'chore: refresh default subscriptions with Firefox fingerprints'
          git push